scalar JSON
scalar Date

type Post {
  id: Int!
  timestamp: Date!
  heading: String!
  title: String!
  content: JSON!
  published: Boolean!
  collection: Collection
  collectionId: Int
  headerImageString: String!
}

input CreatePostInput {
  title: String
  heading: String
  content: JSON
  collectionId: Int
  headerImageString: String
}

input UpdatePostInput {
  id: Int!
  title: String
  content: JSON
  published: Boolean
  modified: Date
  heading: String
  headerImageString: String
}

type Query {
  posts: [Post]!
  post(id: Int!): Post
  postsInCollection(collectionId: Int!): [Post]!
  postsByCollectionTitle(collectionTitle: String!): [Post]!
}

type Mutation {
  createPost(createPostInput: CreatePostInput!): Post!
  updatePost(updatePostInput: UpdatePostInput!): Post!
  removePost(id: Int!): Post
}
